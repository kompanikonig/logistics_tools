<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Стендап команды</title>
<style>
:root{
  --bg:#eef2f6; --panel:#fff; --panel2:#f6f9fc; --line:#e7eef5; --line2:#d6e0ec;
  --txt:#1d3454; --txt2:#5b6b82; --txt3:#9aa7b8;
  --accent:#6cb33a; --accent-d:#4f8f28;
  --done:#6cb33a; --wip:#5b8fc7; --fail:#e0533d; --moved:#e0993d;
  --vac:#5b8fc7; --sick:#e0993d;
  --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --shadow:0 1px 3px rgba(20,40,70,.06),0 8px 24px rgba(20,40,70,.05);
}
body.dark{
  --bg:#0f1722; --panel:#16202d; --panel2:#1b2632; --line:#22303f; --line2:#2c3c4d;
  --txt:#e3ecf5; --txt2:#9fb0c2; --txt3:#6b7d90;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--txt);font-family:var(--body);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;padding:0 0 60px}
.wrap{max-width:1320px;margin:0 auto;padding:22px 22px 0}
header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:0;color:var(--accent-d)}
body.dark h1{color:var(--accent)}
.sub{color:var(--txt2);font-size:13px;margin-top:4px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.who{display:flex;align-items:center;gap:8px;background:var(--panel);border:1.5px solid var(--line2);border-radius:11px;padding:7px 10px}
.who label{font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
select,input[type=text]{font-family:var(--body);font-size:14px;color:var(--txt);background:var(--panel);
  border:1.5px solid var(--line2);border-radius:9px;padding:7px 10px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
.btn{font-family:var(--body);font-size:13px;font-weight:600;color:var(--txt);background:var(--panel);
  border:1.5px solid var(--line2);border-radius:10px;padding:8px 13px;cursor:pointer;transition:.13s}
.btn:hover{border-color:var(--accent);color:var(--accent-d)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-d);color:#fff}
.btn.icon{padding:8px 11px}
.datebar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.datebar .dt{font-size:18px;font-weight:700}
.datebar .dow{font-family:var(--mono);font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
.note-shared{font-size:11.5px;color:var(--txt3);margin-left:auto;display:flex;align-items:center;gap:5px}

/* board */
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:30px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;overflow:hidden;transition:.15s}
.card.mine{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow)}
.chead{display:flex;align-items:center;gap:9px;padding:13px 15px 11px;border-bottom:1px solid var(--line)}
.ava{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:12px;
  display:flex;align-items:center;justify-content:center;flex:none;font-family:var(--mono)}
.cname{font-weight:700;font-size:14.5px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.daystatus{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:3px 8px;border-radius:20px;cursor:default;white-space:nowrap}
.ds-work{background:rgba(108,179,58,.15);color:var(--accent-d)}
.ds-vacation{background:rgba(91,143,199,.16);color:var(--vac)}
.ds-sick{background:rgba(224,153,61,.16);color:var(--sick)}
.card.mine .daystatus{cursor:pointer}
.dsnote{font-size:11.5px;color:var(--txt2);padding:0 15px;margin-top:-2px}
.dsnote input{width:100%;border:none;border-bottom:1px dashed var(--line2);border-radius:0;padding:4px 0;font-size:11.5px;background:transparent}
.tasks{padding:8px 10px 4px;flex:1;min-height:30px}
.task{display:flex;align-items:flex-start;gap:9px;padding:6px 6px;border-radius:9px;transition:.12s}
.task:hover{background:var(--panel2)}
.st{flex:none;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:12px;border:1.5px solid var(--line2);background:var(--panel);margin-top:1px}
.card.mine .st{cursor:pointer}
.st-done{background:var(--done);border-color:var(--done);color:#fff}
.st-wip{background:var(--wip);border-color:var(--wip);color:#fff}
.st-fail{background:var(--fail);border-color:var(--fail);color:#fff}
.st-moved{background:var(--moved);border-color:var(--moved);color:#fff}
.ttext{flex:1;font-size:13.5px;word-break:break-word;padding-top:2px}
.task.done .ttext{text-decoration:line-through;color:var(--txt3)}
.task.moved .ttext{color:var(--txt2);font-style:italic}
.tdel{flex:none;opacity:0;color:var(--txt3);cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:5px}
.task:hover .tdel{opacity:1}
.tdel:hover{color:var(--fail);background:var(--panel)}
.addrow{padding:6px 12px 12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.addrow textarea{width:100%;border:1.5px solid var(--line2);border-radius:9px;padding:8px 10px;font-family:var(--body);
  font-size:13.5px;color:var(--txt);background:var(--panel);resize:vertical;min-height:38px;outline:none;line-height:1.4}
.addrow textarea:focus{border-color:var(--accent)}
.addhint{font-size:11px;color:var(--txt3)}
.cfoot{display:flex;gap:8px;flex-wrap:wrap}
.empty-card{color:var(--txt3);font-size:13px;text-align:center;padding:14px 0}
.readonly-note{font-size:11px;color:var(--txt3);text-align:center;padding:8px 0 2px}
.counts{font-family:var(--mono);font-size:10.5px;color:var(--txt3);padding:0 15px 10px;display:flex;gap:10px}
.counts b{color:var(--txt2)}

/* archive */
.section-h{font-size:16px;font-weight:700;margin:8px 0 14px;display:flex;align-items:center;gap:10px}
.section-h .line{flex:1;height:1px;background:var(--line)}
.arch-day{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden}
.arch-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:.12s}
.arch-head:hover{background:var(--panel2)}
.arch-date{font-weight:700;font-size:14px;min-width:62px}
.arch-dow{font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase}
.arch-meta{font-family:var(--mono);font-size:11px;color:var(--txt2);margin-left:auto;display:flex;gap:12px;align-items:center}
.pbar{width:120px;height:7px;border-radius:5px;background:var(--line);overflow:hidden;display:flex}
.pbar i{height:100%}
.car{color:var(--txt3);transition:.15s;font-size:11px}
.arch-day.open .car{transform:rotate(90deg)}
.arch-body{display:none;padding:4px 16px 14px;border-top:1px solid var(--line);
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.arch-day.open .arch-body{display:grid}
.mini{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.mini.mine{border-color:var(--accent)}
.mini h4{margin:0 0 8px;font-size:13px;display:flex;align-items:center;gap:7px}
.mini .daystatus{font-size:9px;padding:2px 6px}
.mini .task{padding:4px 2px}
.mini .task:hover{background:transparent}
.empty{color:var(--txt3);font-size:13px;text-align:center;padding:30px 0}
.loading{text-align:center;color:var(--txt2);padding:40px 0;font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line2);border-top-color:var(--accent);
  border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 16px;font-size:12px;color:var(--txt2)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:16px;height:16px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){.wrap{padding:16px 13px 0}h1{font-size:22px}.board{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Стендап команды</h1>
      <div class="sub">Ежедневный план в свободной форме · статусы задач · архив по дням</div>
    </div>
    <div class="toolbar">
      <div class="who"><label>Я</label>
        <select id="meSel"></select>
      </div>
      <button class="btn icon" id="themeBtn" title="Тема">🌙</button>
    </div>
  </header>

  <div class="legend" id="legend"></div>

  <div class="datebar">
    <button class="btn icon" id="prevDay" title="Предыдущий день">‹</button>
    <div><div class="dt" id="curDate">—</div><div class="dow" id="curDow"></div></div>
    <button class="btn icon" id="nextDay" title="Следующий день">›</button>
    <button class="btn" id="todayBtn">Сегодня</button>
    <button class="btn primary" id="carryBtn" title="Перенести мои невыполненные задачи с прошлого дня">↩ Перенести невыполненные</button>
    <div class="note-shared">🔒 общий доступ — записи видит вся команда</div>
  </div>

  <div id="board" class="board"></div>

  <div class="section-h">Архив по дням <span class="line"></span></div>
  <div id="archive"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const PEOPLE = ['Иракли Бурдули','Павел Шакиров','Олег Саушкин','Илья Троян','Светлана Климова','Валентина Куренная'];
const ST = ['wip','done','fail','moved'];
const ST_ICON = {wip:'⏳',done:'✓',fail:'✕',moved:'→'};
const ST_LABEL = {wip:'в работе',done:'выполнено',fail:'не сделано',moved:'перенесено'};
const DS = ['work','vacation','sick'];
const DS_LABEL = {work:'работаю',vacation:'отпуск',sick:'болею'};
const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const DOW = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];

let me = PEOPLE[0];
let cur = isoToday();
let cache = {};          // date -> { people: { name: {status, note, tasks:[{id,text,st}]} } }
let archiveOpen = {};    // date -> bool

function isoToday(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return ('0'+n).slice(-2); }
function fmtDate(iso){ const [y,m,d]=iso.split('-'); return d+'.'+m; }
function fmtLong(iso){ const [y,m,d]=iso.split('-'); return +d+' '+MONTHS[+m-1]+' '+y; }
function dowOf(iso){ const [y,m,d]=iso.split('-'); return DOW[new Date(+y,+m-1,+d).getDay()]; }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(name){ const p=name.split(' '); return ((p[0]||'')[0]||'')+((p[1]||'')[0]||''); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

function blankDay(){ const o={people:{}}; PEOPLE.forEach(n=>o.people[n]={status:'work',note:'',tasks:[]}); return o; }
function dayOf(iso){ if(!cache[iso]) cache[iso]=blankDay(); if(!cache[iso].people) cache[iso].people={};
  PEOPLE.forEach(n=>{ if(!cache[iso].people[n]) cache[iso].people[n]={status:'work',note:'',tasks:[]}; }); return cache[iso]; }

// ---------- storage ----------
async function loadAll(){
  try{
    const res = await window.storage.list('su:', true);
    const keys = (res && res.keys) ? res.keys : [];
    for(const k of keys){
      try{ const r = await window.storage.get(k, true); if(r && r.value){ const iso=k.slice(3); cache[iso]=JSON.parse(r.value); } }
      catch(e){ /* skip */ }
    }
  }catch(e){ console.log('load', e); }
}
async function saveDay(iso){
  // read-modify-write, чтобы не затирать чужие записи при одновременном редактировании
  let merged = blankDay();
  try{ const r = await window.storage.get('su:'+iso, true); if(r && r.value) merged = JSON.parse(r.value); }
  catch(e){ /* нет ключа — ок */ }
  if(!merged.people) merged.people={};
  // вписываем ТОЛЬКО свою запись
  merged.people[me] = dayOf(iso).people[me];
  cache[iso] = merged;
  try{ await window.storage.set('su:'+iso, JSON.stringify(merged), true); }
  catch(e){ toast('Не удалось сохранить — попробуйте ещё раз'); console.log('save', e); }
}
async function loadMe(){
  try{ const r = await window.storage.get('me', false); if(r && r.value && PEOPLE.includes(r.value)) me=r.value; }
  catch(e){}
}
async function saveMe(){ try{ await window.storage.set('me', me, false); }catch(e){} }

// ---------- rendering ----------
function statusCounts(day){
  let done=0,total=0;
  PEOPLE.forEach(n=>{ (day.people[n].tasks||[]).forEach(t=>{ total++; if(t.st==='done')done++; }); });
  return {done,total};
}
function renderBoard(){
  const day = dayOf(cur);
  document.getElementById('curDate').textContent = fmtLong(cur) + (cur===isoToday()?' · сегодня':'');
  document.getElementById('curDow').textContent = dowOf(cur);
  const board = document.getElementById('board');
  board.innerHTML = PEOPLE.map(name=>cardHTML(name, day.people[name], cur, name===me)).join('');
  wireCards(cur);
}
function cardHTML(name, pdata, iso, editable){
  pdata = pdata || {status:'work',note:'',tasks:[]};
  const tasks = pdata.tasks||[];
  const dsCls = 'ds-'+(pdata.status||'work');
  const tasksHTML = tasks.length ? tasks.map(t=>taskHTML(t, editable)).join('')
    : `<div class="empty-card">${editable?'Напишите план на день ниже':'Пока пусто'}</div>`;
  const noteHTML = (pdata.status && pdata.status!=='work')
    ? (editable
        ? `<div class="dsnote"><input type="text" data-note placeholder="комментарий (напр. отпуск с 8 по 11)" value="${esc(pdata.note||'')}"></div>`
        : (pdata.note?`<div class="dsnote">${esc(pdata.note)}</div>`:''))
    : '';
  const done = tasks.filter(t=>t.st==='done').length;
  const addHTML = editable ? `
    <div class="addrow">
      <textarea data-add placeholder="+ задача (Enter — добавить, по строке на задачу)"></textarea>
      <div class="addhint">Каждая строка — отдельная задача. Клик по значку слева меняет статус.</div>
    </div>` : `<div class="readonly-note">только ${esc(name)} редактирует свою колонку</div>`;
  return `<div class="card${editable?' mine':''}" data-card="${esc(name)}">
    <div class="chead">
      <div class="ava">${esc(initials(name))}</div>
      <div class="cname" title="${esc(name)}">${esc(name)}</div>
      <span class="daystatus ${dsCls}" data-ds title="${editable?'клик — сменить статус':''}">${DS_LABEL[pdata.status||'work']}</span>
    </div>
    ${noteHTML}
    <div class="counts"><span><b>${tasks.length}</b> задач</span><span><b>${done}</b> ✓</span></div>
    <div class="tasks">${tasksHTML}</div>
    ${addHTML}
  </div>`;
}
function taskHTML(t, editable){
  return `<div class="task ${t.st}" data-task="${t.id}">
    <div class="st st-${t.st}" data-st title="${ST_LABEL[t.st]}">${ST_ICON[t.st]}</div>
    <div class="ttext">${esc(t.text)}</div>
    ${editable?`<div class="tdel" data-del title="удалить">×</div>`:''}
  </div>`;
}
function wireCards(iso){
  const day = dayOf(iso);
  document.querySelectorAll('.card.mine').forEach(card=>{
    const name = card.dataset.card;
    const p = day.people[name];
    // day status cycle
    card.querySelector('[data-ds]').onclick=()=>{ p.status = DS[(DS.indexOf(p.status)+1)%DS.length]; saveDay(iso).then(()=>renderAll()); };
    // note
    const noteEl = card.querySelector('[data-note]');
    if(noteEl) noteEl.onchange=()=>{ p.note=noteEl.value.trim(); saveDay(iso); };
    // task status + delete
    card.querySelectorAll('.task').forEach(tr=>{
      const t = p.tasks.find(x=>x.id===tr.dataset.task); if(!t) return;
      const st = tr.querySelector('[data-st]'); if(st) st.onclick=()=>{ t.st=ST[(ST.indexOf(t.st)+1)%ST.length]; saveDay(iso).then(()=>renderAll()); };
      const del = tr.querySelector('[data-del]'); if(del) del.onclick=()=>{ p.tasks=p.tasks.filter(x=>x.id!==t.id); saveDay(iso).then(()=>renderAll()); };
    });
    // add tasks
    const ta = card.querySelector('[data-add]');
    if(ta) ta.onkeydown=(e)=>{
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault();
        const lines = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
        if(lines.length){ lines.forEach(line=>p.tasks.push({id:uid(),text:line,st:'wip'})); ta.value=''; saveDay(iso).then(()=>renderAll()); }
      }
    };
  });
}
function renderArchive(){
  const days = Object.keys(cache).filter(d=>d!==cur).sort().reverse();
  const el = document.getElementById('archive');
  if(!days.length){ el.innerHTML='<div class="empty">Архив пуст — прошлые дни появятся здесь автоматически.</div>'; return; }
  el.innerHTML = days.map(iso=>{
    const day=dayOf(iso); const {done,total}=statusCounts(day);
    const fail=(()=>{let f=0;PEOPLE.forEach(n=>day.people[n].tasks.forEach(t=>{if(t.st==='fail')f++;}));return f;})();
    const wip=total-done-fail;
    const seg=(c,col)=>c>0?`<i style="width:${c/total*100}%;background:${col}"></i>`:'';
    const bar = total? `<div class="pbar">${seg(done,'var(--done)')}${seg(wip,'var(--wip)')}${seg(fail,'var(--fail)')}</div>`:'';
    const open = archiveOpen[iso];
    const bodies = PEOPLE.map(name=>{
      const p=day.people[name]; const tasks=p.tasks||[];
      if(!tasks.length && (p.status==='work')) return '';
      const ds = (p.status&&p.status!=='work')?`<span class="daystatus ds-${p.status}">${DS_LABEL[p.status]}${p.note?': '+esc(p.note):''}</span>`:'';
      const tlist = tasks.length? tasks.map(t=>taskHTML(t, name===me)).join('') : '<div class="empty-card">—</div>';
      return `<div class="mini${name===me?' mine':''}" data-mini="${esc(name)}"><h4>${esc(name)} ${ds}</h4>${tlist}</div>`;
    }).join('');
    return `<div class="arch-day${open?' open':''}" data-arch="${iso}">
      <div class="arch-head" data-archhead><span class="car">▶</span>
        <span class="arch-date">${fmtDate(iso)}</span><span class="arch-dow">${dowOf(iso)}</span>
        <span class="arch-meta"><span><b>${total}</b> задач · ${done} ✓ · ${fail} ✕</span>${bar}</span>
      </div>
      <div class="arch-body">${bodies||'<div class="empty">Записей нет</div>'}</div>
    </div>`;
  }).join('');
  // wire archive
  el.querySelectorAll('.arch-day').forEach(node=>{
    const iso=node.dataset.arch;
    node.querySelector('[data-archhead]').onclick=()=>{ archiveOpen[iso]=!archiveOpen[iso]; node.classList.toggle('open'); };
    node.querySelectorAll('.mini.mine').forEach(mini=>{
      const name=mini.dataset.mini, p=dayOf(iso).people[name];
      mini.querySelectorAll('.task').forEach(tr=>{
        const t=p.tasks.find(x=>x.id===tr.dataset.task); if(!t) return;
        const st=tr.querySelector('[data-st]'); if(st) st.onclick=()=>{ t.st=ST[(ST.indexOf(t.st)+1)%ST.length]; saveDay(iso).then(()=>renderAll()); };
      });
    });
  });
}
function renderAll(){ renderBoard(); renderArchive(); }

// ---------- actions ----------
async function carryOver(){
  const days = Object.keys(cache).filter(d=>d<cur).sort().reverse();
  let src=null;
  for(const d of days){ const t=dayOf(d).people[me].tasks||[]; if(t.some(x=>x.st!=='done')){ src=d; break; } }
  if(!src){ toast('Нет невыполненных задач в прошлых днях'); return; }
  const carried = dayOf(src).people[me].tasks.filter(t=>t.st!=='done');
  const today = dayOf(cur).people[me];
  const existing = new Set(today.tasks.map(t=>t.text.toLowerCase()));
  let n=0;
  carried.forEach(t=>{ if(!existing.has(t.text.toLowerCase())){ today.tasks.push({id:uid(),text:t.text,st:'wip'}); n++; } });
  // отметим в источнике как перенесённые
  dayOf(src).people[me].tasks.forEach(t=>{ if(t.st!=='done') t.st='moved'; });
  await saveDay(src); await saveDay(cur);
  renderAll(); toast(n?`Перенесено задач: ${n} (из ${fmtDate(src)})`:'Все незавершённые уже есть в сегодня');
}
function shiftDay(delta){
  const [y,m,d]=cur.split('-'); const dt=new Date(+y,+m-1,+d); dt.setDate(dt.getDate()+delta);
  cur = dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate()); renderAll();
}

// ---------- init ----------
function buildMeSelect(){
  const sel=document.getElementById('meSel');
  sel.innerHTML=PEOPLE.map(n=>`<option${n===me?' selected':''}>${esc(n)}</option>`).join('');
  sel.onchange=()=>{ me=sel.value; saveMe(); renderAll(); };
}
function buildLegend(){
  document.getElementById('legend').innerHTML =
    ST.map(s=>`<span><i class="st-${s}">${ST_ICON[s]}</i>${ST_LABEL[s]}</span>`).join('') +
    `<span style="margin-left:6px;color:var(--txt3)">·</span>` +
    DS.map(s=>`<span><i class="ds-${s}" style="color:var(--${s==='work'?'accent':s})">●</i>${DS_LABEL[s]}</span>`).join('');
}
async function init(){
  document.getElementById('board').innerHTML='<div class="loading"><span class="spin"></span>Загрузка данных команды…</div>';
  await loadMe();
  await loadAll();
  buildMeSelect(); buildLegend();
  document.getElementById('prevDay').onclick=()=>shiftDay(-1);
  document.getElementById('nextDay').onclick=()=>shiftDay(1);
  document.getElementById('todayBtn').onclick=()=>{ cur=isoToday(); renderAll(); };
  document.getElementById('carryBtn').onclick=carryOver;
  document.getElementById('themeBtn').onclick=()=>{ document.body.classList.toggle('dark');
    document.getElementById('themeBtn').textContent=document.body.classList.contains('dark')?'☀️':'🌙'; };
  renderAll();
}
init();
</script>
