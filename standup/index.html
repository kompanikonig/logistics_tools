<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Стендап команды</title>
<style>
:root{
  --bg:#eef2f6; --panel:#fff; --panel2:#f6f9fc; --line:#e7eef5; --line2:#d6e0ec;
  --txt:#1d3454; --txt2:#5b6b82; --txt3:#9aa7b8;
  --accent:#6cb33a; --accent-d:#4f8f28;
  --done:#6cb33a; --wip:#5b8fc7; --fail:#e0533d; --moved:#e0993d; --block:#8b5cf6;
  --vac:#5b8fc7; --sick:#e0993d;
  --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --shadow:0 1px 3px rgba(20,40,70,.06),0 8px 24px rgba(20,40,70,.05);
}
body.dark{
  --bg:#0f1722; --panel:#16202d; --panel2:#1b2632; --line:#22303f; --line2:#2c3c4d;
  --txt:#e3ecf5; --txt2:#9fb0c2; --txt3:#6b7d90;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--txt);font-family:var(--body);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;padding:0 0 60px}
.wrap{max-width:1320px;margin:0 auto;padding:22px 22px 0}
header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.lobby-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--txt3);text-decoration:none;letter-spacing:.3px;margin-bottom:6px;opacity:.75;transition:opacity .15s}
.lobby-back:hover{opacity:1;color:var(--accent)}
h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:0;color:var(--accent-d)}
body.dark h1{color:var(--accent)}
.sub{color:var(--txt2);font-size:13px;margin-top:4px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.who{display:flex;align-items:center;gap:8px;background:var(--panel);border:1.5px solid var(--line2);border-radius:11px;padding:7px 10px}
.who label{font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
select,input[type=text]{font-family:var(--body);font-size:14px;color:var(--txt);background:var(--panel);
  border:1.5px solid var(--line2);border-radius:9px;padding:7px 10px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
.btn{font-family:var(--body);font-size:13px;font-weight:600;color:var(--txt);background:var(--panel);
  border:1.5px solid var(--line2);border-radius:10px;padding:8px 13px;cursor:pointer;transition:.13s}
.btn:hover{border-color:var(--accent);color:var(--accent-d)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-d);color:#fff}
.btn.icon{padding:8px 11px}
.datebar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.datebar .dt{font-size:18px;font-weight:700}
.datebar .dow{font-family:var(--mono);font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
.note-shared{font-size:11.5px;color:var(--txt3);margin-left:auto;display:flex;align-items:center;gap:5px;white-space:nowrap}
.note-shared.err{color:var(--fail)}
.note-shared.warn{color:var(--moved)}
.note-shared.busy{color:var(--wip)}
.sync-btn{margin-left:auto}
.sync-btn + .note-shared{margin-left:10px}
input[type=date]{font-family:var(--body);font-size:13px;color:var(--txt);background:var(--panel);
  border:1.5px solid var(--line2);border-radius:9px;padding:6px 9px;outline:none;cursor:pointer}
input[type=date]:focus{border-color:var(--accent)}

/* week panel */
.weekpanel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
  padding:13px 16px 14px;margin-bottom:18px;display:flex;flex-direction:column;gap:10px}
.wk-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.wk-title{font-weight:700;font-size:14px}
.wk-range{font-family:var(--mono);font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.wk-pct{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--txt2)}
.wk-pct b{color:var(--accent-d);font-size:14px}
body.dark .wk-pct b{color:var(--accent)}
.wk-pbar{height:8px;border-radius:5px;background:var(--line);overflow:hidden;display:flex}
.wk-pbar i{height:100%}
.wk-stats{font-family:var(--mono);font-size:11.5px;color:var(--txt2);display:flex;gap:14px;flex-wrap:wrap}
.wk-stats span{display:inline-flex;align-items:center;gap:5px}
.wk-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:2px}
.wk-day{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 2px 5px;
  border-radius:9px;border:1.5px solid transparent;transition:.12s}
.wk-day:hover{background:var(--panel2);border-color:var(--line2)}
.wk-day.cur{border-color:var(--accent);background:rgba(108,179,58,.08)}
.wk-day.today .wk-dnum{color:var(--accent-d)}
body.dark .wk-day.today .wk-dnum{color:var(--accent)}
.wk-col{position:relative;width:100%;height:6px;background:var(--line);border-radius:4px;overflow:hidden}
.wk-col i{display:block;height:100%;background:var(--done);border-radius:4px}
.wk-cnt{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--txt2)}
.wk-cnt.empty{color:var(--txt3);font-weight:400}
.wk-dlabel{font-family:var(--mono);font-size:9px;color:var(--txt3);text-transform:uppercase}
.wk-dnum{font-size:11px;font-weight:700;color:var(--txt2)}
.wk-empty{color:var(--txt3);font-size:12.5px}

/* task note + status popover */
.tnote{font-size:11.5px;color:var(--txt2);background:var(--panel2);border-left:2px solid var(--line2);
  border-radius:0 6px 6px 0;padding:3px 8px;margin:3px 0 1px 31px;word-break:break-word}
.task.blocked .tnote{border-left-color:var(--block);color:var(--block)}
.stpop-back{position:fixed;inset:0;z-index:60;background:transparent}
.stpop{position:fixed;z-index:61;background:var(--panel);border:1px solid var(--line2);border-radius:12px;
  box-shadow:var(--shadow);padding:10px;width:240px;display:flex;flex-direction:column;gap:8px}
.stpop .opts{display:flex;flex-wrap:wrap;gap:6px}
.stpop .opt{display:inline-flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;
  border:1.5px solid var(--line2);border-radius:8px;padding:5px 8px;transition:.12s;background:var(--panel);color:var(--txt)}
.stpop .opt:hover{border-color:var(--accent)}
.stpop .opt.active{border-color:var(--accent);background:rgba(108,179,58,.1)}
.stpop .opt .ic{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.stpop textarea{width:100%;border:1.5px solid var(--line2);border-radius:8px;padding:6px 8px;font-family:var(--body);
  font-size:12.5px;color:var(--txt);background:var(--panel);resize:vertical;min-height:34px;outline:none;line-height:1.35}
.stpop textarea:focus{border-color:var(--accent)}
.stpop .pf{display:flex;justify-content:space-between;align-items:center}
.stpop .pf .hint{font-size:10.5px;color:var(--txt3)}
.stpop .pf .done-btn{font-size:12px;font-weight:600;color:#fff;background:var(--accent);border:none;
  border-radius:8px;padding:5px 12px;cursor:pointer}
.cfgbar{display:none;align-items:center;gap:10px;background:rgba(224,153,61,.12);border:1px solid var(--moved);
  color:var(--moved);border-radius:11px;padding:9px 14px;margin-bottom:16px;font-size:12.5px}
.cfgbar.show{display:flex}
.cfgbar code{font-family:var(--mono);font-size:11.5px;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px}
body.dark .cfgbar code{background:rgba(255,255,255,.08)}

/* board */
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:30px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;overflow:hidden;transition:.15s}
.card.mine{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--shadow)}
.chead{display:flex;align-items:center;gap:9px;padding:13px 15px 11px;border-bottom:1px solid var(--line)}
.ava{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:12px;
  display:flex;align-items:center;justify-content:center;flex:none;font-family:var(--mono)}
.cname{font-weight:700;font-size:14.5px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.daystatus{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:3px 8px;border-radius:20px;cursor:default;white-space:nowrap}
.ds-work{background:rgba(108,179,58,.15);color:var(--accent-d)}
.ds-vacation{background:rgba(91,143,199,.16);color:var(--vac)}
.ds-sick{background:rgba(224,153,61,.16);color:var(--sick)}
.card.mine .daystatus{cursor:pointer}
.dsnote{font-size:11.5px;color:var(--txt2);padding:0 15px;margin-top:-2px}
.dsnote input{width:100%;border:none;border-bottom:1px dashed var(--line2);border-radius:0;padding:4px 0;font-size:11.5px;background:transparent}
.tasks{padding:8px 10px 4px;flex:1;min-height:30px}
.task{display:flex;align-items:flex-start;gap:9px;padding:6px 6px;border-radius:9px;transition:.12s}
.task:hover{background:var(--panel2)}
.st{flex:none;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:12px;border:1.5px solid var(--line2);background:var(--panel);margin-top:1px}
.card.mine .st{cursor:pointer}
.st-done{background:var(--done);border-color:var(--done);color:#fff}
.st-wip{background:var(--wip);border-color:var(--wip);color:#fff}
.st-fail{background:var(--fail);border-color:var(--fail);color:#fff}
.st-moved{background:var(--moved);border-color:var(--moved);color:#fff}
.st-blocked{background:var(--block);border-color:var(--block);color:#fff}
.ttext{flex:1;font-size:13.5px;word-break:break-word;padding-top:2px}
.task.done .ttext{text-decoration:line-through;color:var(--txt3)}
.task.moved .ttext{color:var(--txt2);font-style:italic}
.task.blocked .ttext{color:var(--block);font-weight:600}

/* blocker panel */
.blockpanel{background:rgba(139,92,246,.07);border:1px solid var(--block);border-radius:14px;
  padding:12px 16px 13px;margin-bottom:18px;display:none}
.blockpanel.show{display:block}
.blockpanel h3{margin:0 0 8px;font-size:13.5px;font-weight:700;color:var(--block);display:flex;align-items:center;gap:7px}
.blockpanel ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px}
.blockpanel li{font-size:13px;display:flex;gap:8px;align-items:flex-start}
.blockpanel .bp-who{font-weight:700;flex:none;min-width:120px}
.blockpanel .bp-task{color:var(--txt);word-break:break-word}

/* team summary (manager) */
.team-row{display:grid;grid-template-columns:150px 1fr auto auto;gap:12px;align-items:center;
  padding:7px 0;border-top:1px solid var(--line)}
.team-row:first-of-type{border-top:none}
.team-name{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:7px;min-width:0}
.team-name .ds-mini{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;
  padding:2px 6px;border-radius:20px}
.team-pbar{height:8px;border-radius:5px;background:var(--line);overflow:hidden;display:flex}
.team-pbar i{height:100%}
.team-num{font-family:var(--mono);font-size:12px;color:var(--txt2);white-space:nowrap}
.team-blk{font-family:var(--mono);font-size:12px;white-space:nowrap;color:var(--block)}
.team-blk.zero{color:var(--txt3)}
.tdel{flex:none;opacity:0;color:var(--txt3);cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:5px}
.task:hover .tdel{opacity:1}
.tdel:hover{color:var(--fail);background:var(--panel)}
.addrow{padding:6px 12px 12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.addrow textarea{width:100%;border:1.5px solid var(--line2);border-radius:9px;padding:8px 10px;font-family:var(--body);
  font-size:13.5px;color:var(--txt);background:var(--panel);resize:vertical;min-height:38px;outline:none;line-height:1.4}
.addrow textarea:focus{border-color:var(--accent)}
.addhint{font-size:11px;color:var(--txt3)}
.cfoot{display:flex;gap:8px;flex-wrap:wrap}
.empty-card{color:var(--txt3);font-size:13px;text-align:center;padding:14px 0}
.readonly-note{font-size:11px;color:var(--txt3);text-align:center;padding:8px 0 2px}
.counts{font-family:var(--mono);font-size:10.5px;color:var(--txt3);padding:0 15px 10px;display:flex;gap:10px}
.counts b{color:var(--txt2)}

/* archive */
.section-h{font-size:16px;font-weight:700;margin:8px 0 14px;display:flex;align-items:center;gap:10px}
.section-h .line{flex:1;height:1px;background:var(--line)}
.arch-day{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden}
.arch-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:.12s}
.arch-head:hover{background:var(--panel2)}
.arch-date{font-weight:700;font-size:14px;min-width:62px}
.arch-dow{font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase}
.arch-meta{font-family:var(--mono);font-size:11px;color:var(--txt2);margin-left:auto;display:flex;gap:12px;align-items:center}
.pbar{width:120px;height:7px;border-radius:5px;background:var(--line);overflow:hidden;display:flex}
.pbar i{height:100%}
.car{color:var(--txt3);transition:.15s;font-size:11px}
.arch-day.open .car{transform:rotate(90deg)}
.arch-body{display:none;padding:4px 16px 14px;border-top:1px solid var(--line);
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.arch-day.open .arch-body{display:grid}
.mini{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.mini.mine{border-color:var(--accent)}
.mini h4{margin:0 0 8px;font-size:13px;display:flex;align-items:center;gap:7px}
.mini .daystatus{font-size:9px;padding:2px 6px}
.mini .task{padding:4px 2px}
.mini .task:hover{background:transparent}
.empty{color:var(--txt3);font-size:13px;text-align:center;padding:30px 0}
.loading{text-align:center;color:var(--txt2);padding:40px 0;font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line2);border-top-color:var(--accent);
  border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 16px;font-size:12px;color:var(--txt2)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:16px;height:16px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){.wrap{padding:16px 13px 0}h1{font-size:22px}.board{grid-template-columns:1fr}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--panel);border-radius:16px;padding:40px 36px;width:320px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px;">
    <h2 style="margin:0;font-size:1.2rem;color:var(--txt);">Стендап команды</h2>
    <p style="margin:0;font-size:.85rem;color:var(--txt2);">Введите пароль для входа</p>
    <input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password"
      style="padding:10px 14px;border:1px solid var(--line2);border-radius:8px;font-size:1rem;background:var(--panel2);color:var(--txt);outline:none;">
    <button id="loginBtn" style="padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;">Войти</button>
    <p id="loginErr" style="margin:0;font-size:.82rem;color:var(--fail);min-height:1em;"></p>
  </div>
</div>
<div id="appWrap" style="display:none;">
<div class="wrap">
  <header class="top">
    <div>
      <a href="../" class="lobby-back" title="Вернуться на главную страницу инструментов">← Лобби</a>
      <h1>Стендап команды</h1>
      <div class="sub">Ежедневный план в свободной форме · статусы задач · архив по дням</div>
    </div>
    <div class="toolbar">
      <div class="who"><label>Я</label>
        <select id="meSel"></select>
      </div>
      <button class="btn icon" id="exportBtn" title="Выгрузить в Excel">📥</button>
      <button class="btn icon" id="themeBtn" title="Тема">🌙</button>
    </div>
  </header>

  <div class="cfgbar" id="cfgbar"></div>

  <div class="legend" id="legend"></div>

  <div class="datebar">
    <button class="btn icon" id="prevDay" title="Предыдущий день (←)">‹</button>
    <div><div class="dt" id="curDate">—</div><div class="dow" id="curDow"></div></div>
    <button class="btn icon" id="nextDay" title="Следующий день (→)">›</button>
    <button class="btn" id="todayBtn">Сегодня</button>
    <button class="btn" id="yesterdayBtn">Вчера</button>
    <input type="date" id="datePick" title="Перейти к дате">
    <button class="btn primary" id="carryBtn" title="Перенести мои невыполненные задачи с прошлого дня">↩ Перенести невыполненные</button>
    <button class="btn icon sync-btn" id="syncBtn" title="Обновить с сервера">⟳</button>
    <div class="note-shared" id="syncNote">общий доступ</div>
  </div>

  <div class="weekpanel" id="weekpanel"></div>

  <div class="blockpanel" id="blockpanel"></div>

  <div id="board" class="board"></div>

  <div class="section-h">Архив по дням <span class="line"></span></div>
  <div id="archive"></div>
</div>
<div class="toast" id="toast"></div>
</div><!-- /appWrap -->

<script>

const DOW = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];

let me = PEOPLE[0];
let cur = isoToday();
let cache = {};          // date -> { people: { name: {status, note, tasks:[{id,text,st}]} } }
let archiveOpen = {};    // date -> bool
let saving = 0;          // счётчик идущих сохранений (защита от перезатирания при поллинге)

function isoToday(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return ('0'+n).slice(-2); }
function fmtDate(iso){ const [y,m,d]=iso.split('-'); return d+'.'+m; }
function fmtLong(iso){ const [y,m,d]=iso.split('-'); return +d+' '+MONTHS[+m-1]+' '+y; }
function dowOf(iso){ const [y,m,d]=iso.split('-'); return DOW[new Date(+y,+m-1,+d).getDay()]; }
function isoOf(dt){ return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate()); }
function addDays(iso,n){ const [y,m,d]=iso.split('-'); const dt=new Date(+y,+m-1,+d); dt.setDate(dt.getDate()+n); return isoOf(dt); }
function weekStart(iso){ const [y,m,d]=iso.split('-'); const dt=new Date(+y,+m-1,+d); const dow=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-dow); return isoOf(dt); } // понедельник недели
function dowShort(iso){ const [y,m,d]=iso.split('-'); return ['вс','пн','вт','ср','чт','пт','сб'][new Date(+y,+m-1,+d).getDay()]; }
// Производственный календарь РФ 2026 (Постановление Правительства РФ от 24.09.2025 № 1466).
// Нерабочие БУДНИ (выходные сб/вс определяются автоматически). Праздники, попавшие на сб/вс,
// здесь не нужны. Перенос совпавших с выходными: 8 марта(вс)→пн 9.03; 9 мая(сб)→пн 11.05.
const HOLIDAYS_2026 = new Set([
  '2026-01-01','2026-01-02','2026-01-05','2026-01-06','2026-01-07','2026-01-08','2026-01-09',
  '2026-02-23','2026-03-09','2026-05-01','2026-05-11','2026-06-12','2026-11-04','2026-12-31'
]);
const WORKDAYS_EXTRA = new Set([ /* рабочие субботы-переносы; в 2026 их нет */ ]);
function isWorkday(iso){
  if(WORKDAYS_EXTRA.has(iso)) return true;
  if(HOLIDAYS_2026.has(iso)) return false;
  const [y,m,d]=iso.split('-'); const dow=new Date(+y,+m-1,+d).getDay();
  return dow!==0 && dow!==6;
}
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(name){ const p=name.split(' '); return ((p[0]||'')[0]||'')+((p[1]||'')[0]||''); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

function blankDay(){ const o={people:{}}; PEOPLE.forEach(n=>o.people[n]={status:'work',note:'',tasks:[]}); return o; }
function dayOf(iso){ if(!cache[iso]) cache[iso]=blankDay(); if(!cache[iso].people) cache[iso].people={};
  PEOPLE.forEach(n=>{ if(!cache[iso].people[n]) cache[iso].people[n]={status:'work',note:'',tasks:[]}; }); return cache[iso]; }

// ---------- storage: Supabase ----------
async function apiGetAll(){
  // ограничиваем выборку последними 60 днями — иначе с ростом архива
  // каждый поллинг тянет всё более тяжёлый payload для всех клиентов
  const since = addDays(isoToday(), -60);
  const [daysRes, tasksRes] = await Promise.all([
    sb.from('standup_days').select('person,date,status,note').gte('date', since),
    sb.from('standup_tasks').select('id,person,date,text,task_status,note,sort_order').gte('date', since).order('sort_order')
  ]);
  if(daysRes.error) throw daysRes.error;
  if(tasksRes.error) throw tasksRes.error;
  const taskMap={};
  (tasksRes.data||[]).forEach(t=>{
    const key=t.date+':'+t.person;
    if(!taskMap[key]) taskMap[key]=[];
    taskMap[key].push({id:t.id, text:t.text, st:t.task_status||'wip', note:t.note||''});
  });
  return (daysRes.data||[]).map(d=>({
    date:d.date, person:d.person,
    status:d.status||'work', note:d.note||'',
    tasks:JSON.stringify(taskMap[d.date+':'+d.person]||[])
  }));
}

async function apiSave(rec){
  const tasks=[]; try{ tasks.push(...JSON.parse(rec.tasks||'[]')); }catch(e){}
  const {error:e1}=await sb.from('standup_days').upsert(
    {person:rec.person, date:rec.date, status:rec.status||'work', note:rec.note||'', updated_at:new Date().toISOString()},
    {onConflict:'person,date'}
  );
  if(e1) throw e1;
  await sb.from('standup_tasks').delete().eq('person',rec.person).eq('date',rec.date);
  if(tasks.length){
    const {error:e2}=await sb.from('standup_tasks').insert(
      tasks.map((t,i)=>({person:rec.person, date:rec.date, text:t.text, task_status:t.st||'wip', note:t.note||'', sort_order:i, updated_at:new Date().toISOString()}))
    );
    if(e2) throw e2;
  }
  return {ok:true};
}

// Раскладывает строки сервера в cache. Свою колонку не трогаем, пока я её редактирую
// или пока идёт сохранение — чтобы не затереть несохранённый ввод.
function mergeRows(rows){
  (rows||[]).forEach(r=>{
    if(!r || !r.date || !r.person) return;
    const keepMine = (r.person===me) && (saving>0 || myFieldFocused());
    if(keepMine) return;
    const day = dayOf(r.date);
    let tasks=[]; try{ tasks=JSON.parse(r.tasks||'[]'); }catch(e){ tasks=[]; }
    day.people[r.person] = { status:r.status||'work', note:r.note||'', tasks };
  });
}
function myFieldFocused(){
  const a=document.activeElement;
  return !!(a && a.closest && a.closest('.card.mine') && /INPUT|TEXTAREA/.test(a.tagName));
}

function recordFor(iso, name){
  const p = dayOf(iso).people[name];
  return {date:iso, person:name, status:p.status||'work', note:p.note||'', tasks:JSON.stringify(p.tasks||[])};
}

async function loadAll(){
  try{
    const rows = await apiGetAll();
    cache = {};
    mergeRows(rows);
    setSync('ok');
  }catch(e){
    setSync('error'); console.log('load', e);
    toast('Не удалось загрузить данные команды');
  }
}
async function saveDay(iso){
  const rec = recordFor(iso, me);
  saving++; setSync('busy');
  try{
    await apiSave(rec);
    setSync('ok');
  }catch(e){
    setSync('error'); console.log('save', e);
    toast('Не удалось сохранить — проверьте связь и повторите');
  }finally{ saving--; }
}
async function pollRefresh(force){
  if(_pop) return; // открыта всплывашка статуса — не трогаем
  if(!force){ if(document.hidden) return; if(saving>0) return; }
  try{
    const rows = await apiGetAll();
    mergeRows(rows);
    setSync('ok');
    if(!myFieldFocused()) renderAll();
  }catch(e){ setSync('error'); }
}

function loadMe(){ try{ const v=localStorage.getItem('standup_me'); if(v && (PEOPLE.includes(v) || v===MANAGER)) me=v; }catch(e){} }
function saveMe(){ try{ localStorage.setItem('standup_me', me); }catch(e){} }

// ---------- индикатор синхронизации ----------
function setSync(state){
  const el=document.getElementById('syncNote'); if(!el) return;
  el.className='note-shared';
  const t=new Date(), hh=pad(t.getHours())+':'+pad(t.getMinutes());
  if(state==='busy'){ el.classList.add('busy'); el.textContent='🟡 сохраняю…'; }
  else if(state==='error'){ el.classList.add('err'); el.textContent='🔴 нет связи — данные не сохранены'; }
  else { el.textContent='🟢 синхронизировано · '+hh; }
}
function showConfigBar(){ document.getElementById('cfgbar').classList.remove('show'); }

// ---------- rendering ----------
function statusCounts(day){
  let done=0,total=0;
  PEOPLE.forEach(n=>{ (day.people[n].tasks||[]).forEach(t=>{ total++; if(t.st==='done')done++; }); });
  return {done,total};
}
function renderBoard(){
  const day = dayOf(cur);
  document.getElementById('curDate').textContent = fmtLong(cur) + (cur===isoToday()?' · сегодня':'') + (isWorkday(cur)?'':' · нерабочий день');
  document.getElementById('curDow').textContent = dowOf(cur);
  const dp = document.getElementById('datePick'); if(dp) dp.value = cur;
  const board = document.getElementById('board');
  board.innerHTML = PEOPLE.map(name=>cardHTML(name, day.people[name], cur, name===me)).join('');
  wireCards(cur);
}
function cardHTML(name, pdata, iso, editable){
  pdata = pdata || {status:'work',note:'',tasks:[]};
  const tasks = pdata.tasks||[];
  const dsCls = 'ds-'+(pdata.status||'work');
  const tasksHTML = tasks.length ? tasks.map(t=>taskHTML(t, editable)).join('')
    : `<div class="empty-card">${editable?'Напишите план на день ниже':'Пока пусто'}</div>`;
  const noteHTML = (pdata.status && pdata.status!=='work')
    ? (editable
        ? `<div class="dsnote"><input type="text" data-note placeholder="комментарий (напр. отпуск с 8 по 11)" value="${esc(pdata.note||'')}"></div>`
        : (pdata.note?`<div class="dsnote">${esc(pdata.note)}</div>`:''))
    : '';
  const done = tasks.filter(t=>t.st==='done').length;
  const addHTML = editable ? `
    <div class="addrow">
      <textarea data-add placeholder="+ задача (Enter — добавить, по строке на задачу)"></textarea>
      <div class="addhint">Каждая строка — отдельная задача. Клик по значку слева меняет статус.</div>
    </div>` : `<div class="readonly-note">только ${esc(name)} редактирует свою колонку</div>`;
  return `<div class="card${editable?' mine':''}" data-card="${esc(name)}">
    <div class="chead">
      <div class="ava">${esc(initials(name))}</div>
      <div class="cname" title="${esc(name)}">${esc(name)}</div>
      <span class="daystatus ${dsCls}" data-ds title="${editable?'клик — сменить статус':''}">${DS_LABEL[pdata.status||'work']}</span>
    </div>
    ${noteHTML}
    <div class="counts"><span><b>${tasks.length}</b> задач</span><span><b>${done}</b> ✓</span></div>
    <div class="tasks">${tasksHTML}</div>
    ${addHTML}
  </div>`;
}
function taskHTML(t, editable){
  const note = t.note ? `<div class="tnote">${esc(t.note)}</div>` : '';
  return `<div class="task ${t.st}" data-task="${t.id}">
    <div class="st st-${t.st}" data-st title="${editable?'клик — статус и комментарий':ST_LABEL[t.st]}">${ST_ICON[t.st]}</div>
    <div class="ttext">${esc(t.text)}${note}</div>
    ${editable?`<div class="tdel" data-del title="удалить">×</div>`:''}
  </div>`;
}
// ---------- всплывашка: статус + комментарий ----------
let _pop = null;
function openTaskEditor(iso, t, anchorEl){
  if(_pop){ _pop.back.remove(); _pop=null; }
  const back = document.createElement('div'); back.className='stpop-back';
  const pop = document.createElement('div'); pop.className='stpop';
  const opts = ST.map(s=>`<div class="opt${s===t.st?' active':''}" data-opt="${s}"><span class="ic st-${s}">${ST_ICON[s]}</span>${ST_LABEL[s]}</div>`).join('');
  pop.innerHTML = `<div class="opts">${opts}</div>
    <textarea data-pnote placeholder="комментарий: почему висит / причина блокера…">${esc(t.note||'')}</textarea>
    <div class="pf"><span class="hint">сохранится при «Готово»</span><button class="done-btn" data-pdone>Готово</button></div>`;
  back.appendChild(pop); document.body.appendChild(back);
  _pop = {iso, t, back};
  // позиционирование рядом с иконкой
  const r = anchorEl.getBoundingClientRect();
  const pw = 240, ph = pop.offsetHeight || 170;
  let left = r.left, top = r.bottom + 6;
  if(left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
  if(top + ph > window.innerHeight - 10) top = Math.max(10, r.top - ph - 6);
  pop.style.left = Math.max(10,left)+'px'; pop.style.top = top+'px';
  pop.querySelectorAll('[data-opt]').forEach(o=>{
    o.onclick=()=>{ t.st=o.dataset.opt; pop.querySelectorAll('[data-opt]').forEach(x=>x.classList.toggle('active', x===o)); };
  });
  const ta = pop.querySelector('[data-pnote]'); ta.oninput=()=>{ t.note = ta.value; };
  pop.querySelector('[data-pdone]').onclick=commitEditor;
  back.onclick=(e)=>{ if(e.target===back) commitEditor(); };
  document.addEventListener('keydown', escClose);
  ta.focus();
}
function escClose(e){ if(e.key==='Escape') commitEditor(); }
function commitEditor(){
  if(!_pop) return;
  const {iso, t, back} = _pop;
  if(t.note!=null){ t.note = String(t.note).trim(); if(!t.note) delete t.note; }
  document.removeEventListener('keydown', escClose);
  back.remove(); _pop=null;
  saveDay(iso).then(()=>renderAll());
}
function wireCards(iso){
  const day = dayOf(iso);
  document.querySelectorAll('.card.mine').forEach(card=>{
    const name = card.dataset.card;
    const p = day.people[name];
    // day status cycle
    card.querySelector('[data-ds]').onclick=()=>{ p.status = DS[(DS.indexOf(p.status)+1)%DS.length]; saveDay(iso).then(()=>renderAll()); };
    // note
    const noteEl = card.querySelector('[data-note]');
    if(noteEl) noteEl.onchange=()=>{ p.note=noteEl.value.trim(); saveDay(iso); };
    // task status + delete
    card.querySelectorAll('.task').forEach(tr=>{
      const t = p.tasks.find(x=>x.id===tr.dataset.task); if(!t) return;
      const st = tr.querySelector('[data-st]'); if(st) st.onclick=(e)=>{ openTaskEditor(iso, t, st); };
      const del = tr.querySelector('[data-del]'); if(del) del.onclick=()=>{ p.tasks=p.tasks.filter(x=>x.id!==t.id); saveDay(iso).then(()=>renderAll()); };
    });
    // add tasks
    const ta = card.querySelector('[data-add]');
    if(ta) ta.onkeydown=(e)=>{
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault();
        const lines = ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
        if(lines.length){ lines.forEach(line=>p.tasks.push({id:uid(),text:line,st:'wip'})); ta.value=''; saveDay(iso).then(()=>renderAll()); }
      }
    };
  });
}
function dayHasContent(iso){
  const day = cache[iso]; if(!day || !day.people) return false;
  return PEOPLE.some(n=>{
    const p = day.people[n] || {};
    return (p.tasks && p.tasks.length) || (p.status && p.status !== 'work');
  });
}
function renderArchive(){
  const days = Object.keys(cache).filter(d=>d!==cur && dayHasContent(d)).sort().reverse();
  const el = document.getElementById('archive');
  if(!days.length){ el.innerHTML='<div class="empty">Архив пуст — прошлые дни с задачами появятся здесь автоматически.</div>'; return; }
  el.innerHTML = days.map(iso=>{
    const day=dayOf(iso); const {done,total}=statusCounts(day);
    const fail=(()=>{let f=0;PEOPLE.forEach(n=>day.people[n].tasks.forEach(t=>{if(t.st==='fail')f++;}));return f;})();
    const wip=total-done-fail;
    const seg=(c,col)=>c>0?`<i style="width:${c/total*100}%;background:${col}"></i>`:'';
    const bar = total? `<div class="pbar">${seg(done,'var(--done)')}${seg(wip,'var(--wip)')}${seg(fail,'var(--fail)')}</div>`:'';
    const open = archiveOpen[iso];
    const bodies = PEOPLE.map(name=>{
      const p=day.people[name]; const tasks=p.tasks||[];
      if(!tasks.length && (p.status==='work')) return '';
      const ds = (p.status&&p.status!=='work')?`<span class="daystatus ds-${p.status}">${DS_LABEL[p.status]}${p.note?': '+esc(p.note):''}</span>`:'';
      const tlist = tasks.length? tasks.map(t=>taskHTML(t, name===me)).join('') : '<div class="empty-card">—</div>';
      return `<div class="mini${name===me?' mine':''}" data-mini="${esc(name)}"><h4>${esc(name)} ${ds}</h4>${tlist}</div>`;
    }).join('');
    return `<div class="arch-day${open?' open':''}" data-arch="${iso}">
      <div class="arch-head" data-archhead><span class="car">▶</span>
        <span class="arch-date">${fmtDate(iso)}</span><span class="arch-dow">${dowOf(iso)}</span>
        <span class="arch-meta"><span><b>${total}</b> задач · ${done} ✓ · ${fail} ✕</span>${bar}</span>
      </div>
      <div class="arch-body">${bodies||'<div class="empty">Записей нет</div>'}</div>
    </div>`;
  }).join('');
  // wire archive
  el.querySelectorAll('.arch-day').forEach(node=>{
    const iso=node.dataset.arch;
    node.querySelector('[data-archhead]').onclick=()=>{ archiveOpen[iso]=!archiveOpen[iso]; node.classList.toggle('open'); };
    node.querySelectorAll('.mini.mine').forEach(mini=>{
      const name=mini.dataset.mini, p=dayOf(iso).people[name];
      mini.querySelectorAll('.task').forEach(tr=>{
        const t=p.tasks.find(x=>x.id===tr.dataset.task); if(!t) return;
        const st=tr.querySelector('[data-st]'); if(st) st.onclick=()=>{ openTaskEditor(iso, t, st); };
      });
    });
  });
}
function isManager(){ return me === MANAGER; }
function renderWeek(){
  const el = document.getElementById('weekpanel'); if(!el) return;
  if(isManager()){ renderTeamSummary(el); return; }
  const start = weekStart(cur);
  const days = []; for(let i=0;i<7;i++){ const iso=addDays(start,i); if(isWorkday(iso)) days.push(iso); }
  let done=0, wip=0, fail=0, moved=0, total=0;
  const per = days.map(iso=>{
    const tasks = (cache[iso] && cache[iso].people[me] && cache[iso].people[me].tasks) || [];
    let dd=0;
    tasks.forEach(t=>{ total++; if(t.st==='done'){done++;dd++;} else if(t.st==='fail')fail++; else if(t.st==='moved')moved++; else wip++; });
    return {iso, total:tasks.length, done:dd};
  });
  const pct = total ? Math.round(done/total*100) : 0;
  const range = fmtDate(start) + ' – ' + fmtDate(addDays(start,6));
  const today = isoToday();

  const seg=(c,col)=> c>0 ? `<i style="width:${c/total*100}%;background:${col}"></i>` : '';
  const barHTML = total
    ? `<div class="wk-pbar">${seg(done,'var(--done)')}${seg(wip,'var(--wip)')}${seg(fail,'var(--fail)')}${seg(moved,'var(--moved)')}</div>`
    : '';

  const stripHTML = per.map(d=>{
    const donePct = d.total ? Math.round(d.done/d.total*100) : 0;
    const cls = (d.iso===cur?' cur':'') + (d.iso===today?' today':'');
    const cnt = d.total ? `<div class="wk-cnt">${d.done}/${d.total}</div>` : `<div class="wk-cnt empty">—</div>`;
    return `<div class="wk-day${cls}" data-day="${d.iso}" title="${fmtDate(d.iso)}: ${d.done}/${d.total}">
      <div class="wk-dlabel">${dowShort(d.iso)}</div>
      <div class="wk-dnum">${d.iso.split('-')[2]}</div>
      <div class="wk-col"><i style="width:${donePct}%"></i></div>
      ${cnt}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="wk-top">
      <span class="wk-title">Моя неделя</span>
      <span class="wk-range">${range}</span>
      <span class="wk-pct"><b>${pct}%</b> · ${done}/${total}</span>
    </div>
    ${barHTML}
    ${total ? `<div class="wk-stats">
        <span><i style="display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--done)"></i> ${done} выполнено</span>
        <span><i style="display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--wip)"></i> ${wip} в работе</span>
        <span><i style="display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--fail)"></i> ${fail} не сделано</span>
        <span><i style="display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--moved)"></i> ${moved} перенесено</span>
      </div>` : `<div class="wk-empty">На этой неделе у вас пока нет задач.</div>`}
    <div class="wk-strip" style="grid-template-columns:repeat(${per.length||1},1fr)">${stripHTML}</div>`;

  el.querySelectorAll('.wk-day').forEach(d=>{
    d.onclick=()=>{ cur=d.dataset.day; renderAll(); };
  });
}
// сводка команды за неделю (режим руководителя)
function renderTeamSummary(el){
  const start = weekStart(cur);
  const days = []; for(let i=0;i<7;i++){ const iso=addDays(start,i); if(isWorkday(iso)) days.push(iso); }
  const range = fmtDate(start) + ' – ' + fmtDate(addDays(start,6));
  let tDone=0, tTotal=0, tBlk=0;
  const rows = PEOPLE.map(name=>{
    let done=0, total=0, blocked=0;
    days.forEach(iso=>{
      const tasks = (cache[iso] && cache[iso].people[name] && cache[iso].people[name].tasks) || [];
      tasks.forEach(t=>{ total++; if(t.st==='done')done++; if(t.st==='blocked')blocked++; });
    });
    tDone+=done; tTotal+=total; tBlk+=blocked;
    // статус на просматриваемый день
    const pCur = (cache[cur] && cache[cur].people[name]) || {status:'work'};
    const dsBadge = (pCur.status && pCur.status!=='work')
      ? `<span class="ds-mini ds-${pCur.status}">${DS_LABEL[pCur.status]}</span>` : '';
    const pct = total ? Math.round(done/total*100) : 0;
    const bar = total
      ? `<div class="team-pbar"><i style="width:${pct}%;background:var(--done)"></i><i style="width:${100-pct}%;background:var(--wip);opacity:.45"></i></div>`
      : `<div class="team-pbar"></div>`;
    return `<div class="team-row">
      <span class="team-name"><span class="ava" style="width:22px;height:22px;font-size:10px">${esc(initials(name))}</span>${esc(name.split(' ')[0])} ${dsBadge}</span>
      ${bar}
      <span class="team-num">${done}/${total}</span>
      <span class="team-blk${blocked?'':' zero'}">🚧 ${blocked}</span>
    </div>`;
  }).join('');
  const tPct = tTotal ? Math.round(tDone/tTotal*100) : 0;
  el.innerHTML = `
    <div class="wk-top">
      <span class="wk-title">Сводка команды за неделю</span>
      <span class="wk-range">${range}</span>
      <span class="wk-pct"><b>${tPct}%</b> · ${tDone}/${tTotal}${tBlk?` · 🚧 ${tBlk}`:''}</span>
    </div>
    ${rows}`;
}
// панель блокеров за просматриваемый день (видна всем)
function renderBlockers(){
  const el = document.getElementById('blockpanel'); if(!el) return;
  const day = cache[cur];
  const items = [];
  if(day && day.people){
    PEOPLE.forEach(name=>{
      const tasks = (day.people[name] && day.people[name].tasks) || [];
      tasks.filter(t=>t.st==='blocked').forEach(t=>{
        const reason = t.note ? ` — <span style="color:var(--txt2)">${esc(t.note)}</span>` : '';
        items.push(`<li><span class="bp-who">${esc(name.split(' ')[0])}</span><span class="bp-task">${esc(t.text)}${reason}</span></li>`);
      });
    });
  }
  if(!items.length){ el.classList.remove('show'); el.innerHTML=''; return; }
  el.innerHTML = `<h3>🚧 Блокеры · ${fmtDate(cur)}</h3><ul>${items.join('')}</ul>`;
  el.classList.add('show');
}
function renderAll(){
  // режим руководителя: скрыть кнопку «Перенести невыполненные»
  const cb = document.getElementById('carryBtn'); if(cb) cb.style.display = isManager() ? 'none' : '';
  renderWeek(); renderBlockers(); renderBoard(); renderArchive();
}

// ---------- actions ----------
async function carryOver(){
  if(isManager()) return;
  const days = Object.keys(cache).filter(d=>d<cur).sort().reverse();
  let src=null;
  for(const d of days){ const t=dayOf(d).people[me].tasks||[]; if(t.some(x=>x.st!=='done')){ src=d; break; } }
  if(!src){ toast('Нет невыполненных задач в прошлых днях'); return; }
  const carried = dayOf(src).people[me].tasks.filter(t=>t.st!=='done');
  const today = dayOf(cur).people[me];
  const existing = new Set(today.tasks.map(t=>t.text.toLowerCase()));
  let n=0;
  carried.forEach(t=>{ if(!existing.has(t.text.toLowerCase())){ today.tasks.push({id:uid(),text:t.text,st:'wip'}); n++; } });
  // отметим в источнике как перенесённые
  dayOf(src).people[me].tasks.forEach(t=>{ if(t.st!=='done') t.st='moved'; });
  await saveDay(src); await saveDay(cur);
  renderAll(); toast(n?`Перенесено задач: ${n} (из ${fmtDate(src)})`:'Все незавершённые уже есть в сегодня');
}
function shiftDay(delta){
  const [y,m,d]=cur.split('-'); const dt=new Date(+y,+m-1,+d); dt.setDate(dt.getDate()+delta);
  cur = dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate()); renderAll();
}

// ---------- экспорт в Excel ----------
async function exportExcel(){
  let rows;
  try{ rows = await apiGetAll(); }
  catch(e){ alert('Не удалось загрузить данные: '+(e.message||e)); return; }
  if(!rows.length){ alert('Нет данных для выгрузки'); return; }
  const out=[];
  rows.forEach(r=>{
    let tasks=[]; try{ tasks=JSON.parse(r.tasks||'[]'); }catch(e){}
    const base={'Дата':r.date,'Сотрудник':r.person,'Статус дня':DS_LABEL[r.status]||r.status,'Комментарий дня':r.note||''};
    if(!tasks.length){ out.push({...base,'Задача':'','Статус задачи':'','Комментарий задачи':''}); return; }
    tasks.forEach(t=>out.push({...base,'Задача':t.text,'Статус задачи':ST_LABEL[t.st]||t.st,'Комментарий задачи':t.note||''}));
  });
  out.sort((a,b)=> a['Дата']<b['Дата']?-1 : a['Дата']>b['Дата']?1 : a['Сотрудник'].localeCompare(b['Сотрудник']));
  const ws=XLSX.utils.json_to_sheet(out);
  ws['!cols']=[{wch:12},{wch:22},{wch:12},{wch:26},{wch:50},{wch:14},{wch:30}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Стендап');
  const d=new Date();
  const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb,`стендап_${ds}.xlsx`);
}
// ---------- init ----------
function buildMeSelect(){
  const sel=document.getElementById('meSel');
  sel.innerHTML = PEOPLE.map(n=>`<option value="${esc(n)}"${n===me?' selected':''}>${esc(n)}</option>`).join('')
    + `<option value="${MANAGER}"${me===MANAGER?' selected':''}>📊 Руководитель (сводка)</option>`;
  sel.onchange=()=>{ me=sel.value; saveMe(); renderAll(); };
}
function buildLegend(){
  document.getElementById('legend').innerHTML =
    ST.map(s=>`<span><i class="st-${s}">${ST_ICON[s]}</i>${ST_LABEL[s]}</span>`).join('') +
    `<span style="margin-left:6px;color:var(--txt3)">·</span>` +
    DS.map(s=>`<span><i class="ds-${s}" style="color:var(--${s==='work'?'accent':s})">●</i>${DS_LABEL[s]}</span>`).join('');
}
async function init(){
  showConfigBar();
  document.getElementById('board').innerHTML='<div class="loading"><span class="spin"></span>Загрузка данных команды…</div>';
  loadMe();
  await loadAll();
  buildMeSelect(); buildLegend();
  document.getElementById('prevDay').onclick=()=>shiftDay(-1);
  document.getElementById('nextDay').onclick=()=>shiftDay(1);
  document.getElementById('todayBtn').onclick=()=>{ cur=isoToday(); renderAll(); };
  document.getElementById('yesterdayBtn').onclick=()=>{ cur=addDays(isoToday(),-1); renderAll(); };
  document.getElementById('datePick').onchange=(e)=>{ if(e.target.value){ cur=e.target.value; renderAll(); } };
  document.addEventListener('keydown',(e)=>{
    const a=document.activeElement;
    if(a && (/INPUT|TEXTAREA|SELECT/.test(a.tagName))) return; // не мешаем вводу
    if(e.key==='ArrowLeft') shiftDay(-1);
    else if(e.key==='ArrowRight') shiftDay(1);
  });
  document.getElementById('carryBtn').onclick=carryOver;
  document.getElementById('syncBtn').onclick=()=>pollRefresh(true);
  document.getElementById('exportBtn').onclick=exportExcel;
  document.getElementById('themeBtn').onclick=()=>{ document.body.classList.toggle('dark');
    document.getElementById('themeBtn').textContent=document.body.classList.contains('dark')?'☀️':'🌙'; };
  renderAll();
  scheduleNextPoll();
}
// рекурсивный setTimeout с джиттером ±5с — чтобы клиенты не опрашивали сервер
// синхронно все вместе (иначе при одновременном открытии доски всей командой
// поллинг каждые 25с превращается в периодический залп запросов от всех сразу)
function scheduleNextPoll(){
  const jitter = Math.random()*10000 - 5000;
  setTimeout(async()=>{ await pollRefresh(false); scheduleNextPoll(); }, POLL_MS + jitter);
}
// ---------- auth ----------
async function doLogin(){
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  const btn=document.getElementById('loginBtn');
  err.textContent=''; btn.disabled=true; btn.textContent='Вхожу…';
  const {error}=await sb.auth.signInWithPassword({email:LOGIN_EMAIL, password:pass});
  btn.disabled=false; btn.textContent='Войти';
  if(error){ err.textContent='Неверный пароль'; return; }
  showApp();
}
function showApp(){
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appWrap').style.display='';
  init();
}
function showLogin(){
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('appWrap').style.display='none';
}

// ---------- start ----------
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session) showApp(); else showLogin();
  document.getElementById('loginBtn').onclick=doLogin;
  document.getElementById('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
})();
</script>
